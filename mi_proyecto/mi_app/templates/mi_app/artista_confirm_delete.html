{% extends 'mi_app/base.html' %}

{% block title %}Eliminar Artista{% endblock %}

{% block content %}
    <h1>¿Estás seguro de que quieres eliminar a {{ object.nombre }}?</h1>
    <form method="post">
        {% csrf_token %}
        <button type="submit" style="color: red;">⚠️ Sí, eliminar definitivamente</button>
    </form>
    <br>
    <a href="{% url 'artista_list' %}">Cancelar y volver</a>
{% endblock %}

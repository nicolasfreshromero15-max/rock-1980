<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rock Nacional{% endblock %}</title>
</head>
<body>
    <header>
<nav>
    <!-- Enlaces de navegación globales -->
    <a href="{% url 'home' %}">🏠 Inicio</a> | 
    <a href="{% url 'artista_list' %}">👤 Artistas</a> |
    <a href="{% url 'banda_list' %}">👥 Bandas</a> |
    <a href="{% url 'cancion_list' %}">🎵 Canciones</a>
</nav>
    </header>
    {% if user.is_authenticated %}
        <span>👋 Hola, <strong>{{ user.username }}</strong>!</span> | 
        <form action="{% url 'logout' %}" method="post" style="display: inline;">
        {% csrf_token %}
        <button type="submit" style="background: none; border: none; color: blue; text-decoration: underline; cursor: pointer; padding: 0;">
            🚪 Cerrar Sesión
        </button>
    </form>
    {% else %}
        <a href="{% url 'login' %}">🔑 Iniciar Sesión</a> | 
        <a href="{% url 'register' %}">📝 Registrarse</a>
    {% endif %}
</nav>
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p> 2026 - Rock Nacional</p>
    </footer>
</body>
</html>

{% extends 'mi_app/base.html' %}

{% block title %}Eliminar Banda{% endblock %}

{% block content %}
    <h1>¿Estás seguro de que quieres eliminar la banda "{{ object.nombre }}"?</h1>
    <form method="post">
        {% csrf_token %}
        <button type="submit" style="color: red;">⚠️ Sí, eliminar definitivamente</button>
    </form>
    <br>
    <a href="{% url 'banda_list' %}">Cancelar</a>
{% endblock %}
